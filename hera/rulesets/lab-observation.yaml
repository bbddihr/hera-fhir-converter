# 검사형 룰셋 — 항목 매핑 (임상 전문가가 코드 없이 수정).
# 미정의 항목은 text 코드 + 원본 단위로 폴백한다. MVP는 데모 등장 항목 위주.

form_type: lab
resource: Observation
category: laboratory

# 단위 표기 → UCUM 정규화 (전역)
ucum_aliases:
  "10^3/uL": "10*3/uL"
  "10^6/uL": "10*6/uL"
  "x10^3/uL": "10*3/uL"
  "x10^6/uL": "10*6/uL"

# 항목 매핑 (선택적 LOINC 활성화). ucum은 문서용 참고값.
items:
  Hemoglobin: { ucum: "g/dL", loinc: "718-7" }
  WBC: { ucum: "10*3/uL", loinc: "6690-2" }
  Platelet: { ucum: "10*3/uL", loinc: "777-3" }
  Glucose: { ucum: "mg/dL", loinc: "2345-7" }
  Creatinine: { ucum: "mg/dL", loinc: "2160-0" }
  Sodium: { ucum: "mmol/L", loinc: "2951-2" }
